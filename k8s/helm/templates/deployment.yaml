apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    control-plane: controller-manager
  {{- include "k8s-auth-registration-operator.labels" . | nindent 4 }}
  name: {{ include "k8s-auth-registration-operator.name" . }}-controller-manager
spec:
  replicas: {{ .Values.manager.replicas | default 1 }}
  selector:
    matchLabels:
      control-plane: controller-manager
    {{- include "k8s-auth-registration-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        control-plane: controller-manager
      {{- include "k8s-auth-registration-operator.labels" . | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
        {{- end }}
      containers:
        - args:
            - --health-probe-bind-address=:8081
            # currently, there don't exist any k8s metrics resources.
            # These have to be re-created if they are going to be used
            - --metrics-bind-address=127.0.0.1:8080
            # currently, there don't exist any k8s leader-election resources.
            # These have to be re-created if they are going to be used as well as uncommenting the leader-elect flag
            # - --leader-elect
          env:
          - name: STAGE
            value: {{ quote .Values.manager.env.stage | default "production"}}
          - name: LOG_LEVEL
            value: {{ quote .Values.manager.env.logLevel | default "info" }}
          - name: NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace


          image: "{{ .Values.manager.image.registry }}/{{ .Values.manager.image.repository }}:{{ .Values.manager.image.tag | default .Chart.AppVersion }}"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          name: manager
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits: {{- toYaml .Values.manager.resourceLimits | nindent
            14 }}
            requests: {{- toYaml .Values.manager.resourceRequests | nindent
            14 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          imagePullPolicy: {{ .Values.manager.imagePullPolicy }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: {{ include "k8s-auth-registration-operator.name" . }}-controller-manager
      terminationGracePeriodSeconds: 10